<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Profesorado CONSUDEC - Generador de Firma Electrónica</title>
    <style>
       body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            background: #f4f4f4; 
        }
        .container { 
            width: 100%;
            max-width: 600px; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center; /* Esto centra los títulos y el botón */}
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        #preview { margin-top: 20px; padding: 20px; border: 1px dashed #444; }
        .btn { background: #004a99; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Profesorado CONSUDEC - Firma Institucional</h2>
        <input type="text" id="nombre" placeholder="Nombre y Apellido" oninput="actualizar()">
        <input type="text" id="cargo" placeholder="Cargo o Departamento" oninput="actualizar()">
        <input type="text" id="celular" placeholder="Celular (ej: +54 9 11...)" oninput="actualizar()">
        
        <div id="preview">
            <table id="firma-final" style="font-family: Arial, sans-serif; color: #333;">
                <tr>
                    <td style="padding-right: 20px; border-right: 2px solid #004a99;">
                        <img src="https://i.ibb.co/23Q2pYBz/Logo-CONSUDEC-2025-002-Pdf-1-Editado.png" width="120" alt="Logo">
                    </td>
                    <td style="padding-left: 20px;">
                        <strong id="out-nombre" style="font-size: 18px; color: #004a99;">Apellido Nombre</strong><br>
                        <span id="out-cargo" style="font-size: 14px; color: #666;">Cargo</span><br>
                        <span id="out-celular" style="font-size: 13px;">Teléfono</span><br>
                        <span style="font-size: 12px; color: #004a99;">www.profesoradoconsudec.edu.ar/</span>
                    </td>
                </tr>
            </table>
        </div>
        <p><small>Para usar: Selecciona la firma con el mouse, cópiala (Ctrl+C) y pégala en tu Gmail/Outlook.</small></p>
    </div>

    <script>
        function actualizar() {
            document.getElementById('out-nombre').innerText = document.getElementById('nombre').value || "Nombre Apellido";
            document.getElementById('out-cargo').innerText = document.getElementById('cargo').value || "Cargo";
            document.getElementById('out-celular').innerText = document.getElementById('celular').value || "Teléfono";
        }
    </script>
</body>

</html>
