<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/23Q2pYBz/Logo-CONSUDEC-2025-002-Pdf-1-Editado.png">
    <title>Profesorado CONSUDEC - Generador de Firma</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            background-color: #282929; /* GRIS OSCURO DE LA PALETA */
        }
        .container { 
            width: 100%;
            max-width: 600px; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center;
            border-top: 6px solid #048964; /* VERDE INSTITUCIONAL */
        }
        h2 { color: #048964; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        #preview { 
            margin-top: 20px; 
            padding: 20px; 
            border: 1px dashed #048964; 
            background: #fff;
            display: flex;
            justify-content: center;
        }

        /* ESTILO DEL BOTÓN NUEVO */
        .btn-copiar {
            background-color: #048964;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-copiar:hover { background-color: #036d50; }
        
        #msg-exito {
            color: #048964;
            font-weight: bold;
            margin-top: 10px;
            display: none; /* Se oculta hasta que copias */
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Firma Institucional</h2>
        
        <input type="text" id="nombre" placeholder="Nombre y Apellido" oninput="actualizar()">
        <input type="text" id="cargo" placeholder="Cargo o Departamento" oninput="actualizar()">

        <div id="preview">
         <table id="firma-final" style="font-family: Arial, sans-serif; color: #282929; text-align: left; margin: 0 auto; line-height: 1.4;">
    <tr>
        <td style="padding-right: 20px; border-right: 2px solid #048964; vertical-align: middle;">
            <img src="https://i.ibb.co/23Q2pYBz/Logo-CONSUDEC-2025-002-Pdf-1-Editado.png" width="115" alt="Logo">
        </td>
        
        <td style="padding-left: 20px; vertical-align: middle;">
            <strong id="out-nombre" style="font-size: 17px; color: #048964; display: block; margin-bottom: 2px;">Nombre Apellido</strong>
            <span id="out-cargo" style="font-size: 13px; color: #282929; font-weight: bold; display: block; margin-bottom: 8px;">Cargo o Departamento</span>
            
            <div style="font-size: 11px; color: #666; border-top: 1px solid #eee; pt: 5px; margin-top: 5px; padding-top: 5px;">
                <span style="display: block; margin-bottom: 2px;">📍 Esmeralda 759, CABA</span>
                <span>📞 (11) 7078-1110 (int. 100)</span><br>
                <span>📱 WhatsApp: (11) 2857-8186</span>
            </div>
            
            <a href="http://www.profesoradoconsudec.edu.ar" style="font-size: 11px; color: #048964; font-weight: bold; text-decoration: none; display: block; margin-top: 8px;">www.profesoradoconsudec.edu.ar</a>
        </td>
    </tr>
</table>
        </div>

        <button class="btn-copiar" onclick="copiarFirma()">Copiar Firma al Portapapeles</button>
        <div id="msg-exito">¡Firma copiada correctamente!</div>

    </div>

    <script>
        // Actualiza el texto mientras escribes
        function actualizar() {
            document.getElementById('out-nombre').innerText = document.getElementById('nombre').value || "Nombre Apellido";
            document.getElementById('out-cargo').innerText = document.getElementById('cargo').value || "Cargo o Departamento";
        }

        // Función mágica para copiar la firma con formato (imágenes y colores)
        function copiarFirma() {
            const table = document.getElementById('firma-final');
            const range = document.createRange();
            range.selectNode(table);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);

            try {
                document.execCommand('copy');
                const msg = document.getElementById('msg-exito');
                msg.style.display = 'block';
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
            } catch (err) {
                alert('Tu navegador no permite copiar automáticamente. Por favor, selecciona la firma manualmente.');
            }
            window.getSelection().removeAllRanges();
        }
    </script>

</body>
</html>
